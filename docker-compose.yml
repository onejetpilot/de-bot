
services:
  bot:
    build:
      context: .
    container_name: de-interview-bot
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  api:
    build:
      context: .
    container_name: de-interview-api
    env_file:
      - .env
    command: ["python", "-m", "uvicorn", "web.api:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      EVENTS_POSTGRES_DSN: postgresql://events_user:events_pass@postgres:5432/events
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: de-interview-postgres
    environment:
      POSTGRES_DB: events
      POSTGRES_USER: events_user
      POSTGRES_PASSWORD: events_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events_user -d events"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: de-interview-clickhouse
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: analytics_user
      CLICKHOUSE_PASSWORD: analytics_pass
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./streaming/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  airflow-webserver:
    image: apache/airflow:2.10.3
    container_name: de-interview-airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      EVENTS_POSTGRES_DSN: postgresql://events_user:events_pass@postgres:5432/events
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: analytics_user
      CLICKHOUSE_PASSWORD: analytics_pass
    volumes:
      - ./streaming/airflow/dags:/opt/airflow/dags
      - airflow_data:/opt/airflow
    command: >
      bash -c "
      pip install --no-cache-dir psycopg[binary]==3.2.9 clickhouse-driver==0.2.9 &&
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
      airflow webserver"
    ports:
      - "8081:8080"
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.10.3
    container_name: de-interview-airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      EVENTS_POSTGRES_DSN: postgresql://events_user:events_pass@postgres:5432/events
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: analytics_user
      CLICKHOUSE_PASSWORD: analytics_pass
    volumes:
      - ./streaming/airflow/dags:/opt/airflow/dags
      - airflow_data:/opt/airflow
    command: >
      bash -c "
      pip install --no-cache-dir psycopg[binary]==3.2.9 clickhouse-driver==0.2.9 &&
      airflow db migrate &&
      airflow scheduler"
    restart: unless-stopped

volumes:
  pg_data:
  ch_data:
  airflow_data:
